<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ETF 每日持股追蹤工具 v3</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background-color: #0b0e11; color: #eaecef; font-family: 'Inter', 'Noto Sans TC', sans-serif; }
        .card { background-color: #161a1e; border: 1px solid #2b2f3a; border-radius: 12px; }
        .input-dark { background-color: #2b3139; border: 1px solid #474d57; color: white; border-radius: 8px; }
        .input-dark:focus { border-color: #f0b90b; outline: none; }
        
        /* Tab Styles */
        .tab-btn { transition: all 0.2s; border: 1px solid transparent; }
        .tab-active { background-color: #f0b90b !important; color: #000 !important; font-weight: bold; }
        .tab-inactive { color: #848e9c; }
        .tab-inactive:hover { background-color: #2b3139; }

        /* Custom Scrollbar */
        .custom-scrollbar::-webkit-scrollbar { width: 6px; height: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #0b0e11; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #3e454d; border-radius: 10px; }
        
        /* Sort Icons */
        .sort-icon::after { content: ' ↕'; opacity: 0.2; margin-left: 4px; }
        .sort-asc::after { content: ' ↑'; opacity: 1; color: #f0b90b; }
        .sort-desc::after { content: ' ↓'; opacity: 1; color: #f0b90b; }

        /* Status Badges */
        .badge-new { background-color: rgba(168, 85, 247, 0.2); color: #c084fc; border: 1px solid rgba(168, 85, 247, 0.3); }
        .badge-up { background-color: rgba(239, 68, 68, 0.2); color: #f87171; border: 1px solid rgba(239, 68, 68, 0.3); }
        .badge-down { background-color: rgba(34, 197, 94, 0.2); color: #4ade80; border: 1px solid rgba(34, 197, 94, 0.3); }
    </style>
</head>
<body class="p-4 md:p-8">
    <div class="max-w-5xl mx-auto space-y-6">
        
        <div class="card p-1 flex">
            <button onclick="switchTab('merger')" id="tab-merger" class="tab-btn flex-1 py-3 rounded-lg text-sm tab-active">
                <i class="fa-solid fa-file-import mr-2"></i>1. 資料匯整 & 上傳
            </button>
            <button onclick="switchTab('viewer')" id="tab-viewer" class="tab-btn flex-1 py-3 rounded-lg text-sm tab-inactive">
                <i class="fa-solid fa-chart-line mr-2"></i>2. 趨勢圖表監控
            </button>
        </div>

        <div id="section-merger" class="card p-6 md:p-8 space-y-8">
            <div class="text-center border-b border-gray-800 pb-6">
                <h1 class="text-2xl font-bold text-white flex items-center justify-center gap-3">
                    <i class="fa-solid fa-database text-yellow-500"></i> 持股數據匯整系統
                </h1>
                <p class="text-gray-500 mt-2 text-sm">支援批次處理 00981A 報表，自動合併歷史紀錄</p>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div class="space-y-4">
                    <label class="block text-sm font-medium text-gray-400">1. 選擇每日報表 (可多選)</label>
                    <input type="file" id="sourceFile" accept=".xlsx, .xls" multiple
                           class="block w-full text-sm text-gray-400 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:bg-yellow-500 file:text-black file:font-bold hover:file:bg-yellow-600 cursor-pointer bg-[#0b0e11] p-2 rounded-lg border border-gray-700">
                    <a href="https://www.ezmoney.com.tw/ETF/Fund/AssetExcelNPOI?fundCode=49YTW" target="_blank"
                       class="inline-block text-xs text-yellow-500 hover:underline">
                        <i class="fa-solid fa-download mr-1"></i> 下載最新成分股來源檔 (00981A)
                    </a>
                </div>

                <div class="space-y-4">
                    <label class="block text-sm font-medium text-gray-400">2. 現有彙整檔 (Monitor.xlsx)</label>
                    <input type="file" id="monitorFile" accept=".xlsx, .xls" 
                           class="block w-full text-sm text-gray-400 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:bg-gray-600 file:text-white file:font-bold hover:file:bg-gray-500 cursor-pointer bg-[#0b0e11] p-2 rounded-lg border border-gray-700">
                </div>
            </div>

            <button id="processBtn" onclick="processFiles()" 
                    class="w-full bg-yellow-500 hover:bg-yellow-600 text-black font-bold py-3 rounded-xl transition-all flex items-center justify-center gap-2 shadow-lg shadow-yellow-500/10">
                <i class="fa-solid fa-gears"></i> 執行匯整並下載 Excel
            </button>

            <div id="uploadSection" class="hidden space-y-4 bg-blue-900/10 p-6 rounded-xl border border-blue-900/30">
                <h3 class="font-bold text-blue-400 flex items-center gap-2 text-sm">
                    <i class="fa-solid fa-cloud-arrow-up"></i> 3. 同步至 Google Sheets (選用)
                </h3>
                <input type="text" id="scriptUrl" placeholder="請貼上 Apps Script 執行網址" 
                       class="w-full p-2.5 text-sm input-dark"
                       onchange="localStorage.setItem('etf_script_url', this.value)">
                <button id="uploadBtn" onclick="uploadToGoogleSheets()" 
                        class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-2.5 rounded-lg transition duration-200">
                    開始雲端同步
                </button>
            </div>
        </div>

        <div id="section-viewer" class="hidden space-y-6">
            <div class="card p-6 flex flex-col md:flex-row items-center gap-6">
                <div class="flex-1">
                    <h2 class="text-xl font-bold text-white mb-1">趨勢監控儀表板</h2>
                    <p class="text-xs text-gray-500 uppercase tracking-widest">Holdings Trend Analysis</p>
                        <div class="flex gap-2">
							</br></br>
							<button onclick="toggleChartAll(false)" class="ctrl-btn"><i class="fa-solid fa-xmark mr-1"></i>全部取消</button>
                            <button onclick="toggleChartAll(true)" class="ctrl-btn"><i class="fa-solid fa-check-double mr-1"></i>全部選取</button>
                        </div>
                </div>
                <div class="w-full md:w-72">
                    <input type="file" id="viewerFile" accept=".xlsx, .xls" onchange="loadChartData()"
                           class="block w-full text-xs text-gray-400 file:mr-3 file:py-2 file:px-4 file:rounded-lg file:border-0 file:bg-[#2b3139] file:text-white cursor-pointer bg-[#0b0e11] p-1.5 rounded-lg border border-gray-700">
                </div>
            </div>
            
            <div class="card p-4 h-[450px] w-full">
                <canvas id="trendChart"></canvas>
            </div>

            <div class="card overflow-hidden">
                <div class="p-4 border-b border-gray-800 flex justify-between items-center">
                    <h3 class="font-bold text-gray-300 text-sm italic">Detailed Data Analysis</h3>
                    <span class="text-[10px] text-gray-500">點擊標題可切換排序</span>
                </div>
                <div class="grid grid-cols-12 gap-2 p-3 bg-[#0b0e11] font-bold text-[11px] text-gray-500 border-b border-gray-800 select-none uppercase tracking-tighter">
                    <div class="col-span-1 cursor-pointer hover:text-yellow-500 sort-icon" id="header-rank" onclick="handleSort('rank')">Rank</div>
                    <div class="col-span-3 cursor-pointer hover:text-yellow-500 sort-icon" id="header-name" onclick="handleSort('name')">Stock Name</div>
                    <div class="col-span-3 cursor-pointer hover:text-yellow-500 sort-icon text-center" id="header-trend" onclick="handleSort('trendVal')">Signal</div>
                    <div class="col-span-5 text-right pr-4 cursor-pointer hover:text-yellow-500 sort-icon" id="header-weight" onclick="handleSort('weight')">Latest Weight / 5-Day Hist.</div>
                </div>
                <div id="dataTableBody" class="custom-scrollbar overflow-y-auto max-h-[400px] divide-y divide-gray-800">
                    <div class="p-12 text-center text-gray-600 text-sm">請先於上方上傳 Monitor 檔案</div>
                </div>
            </div>
        </div>

        <div id="statusArea" class="hidden card p-4 border-l-4 border-l-yellow-500 text-xs font-mono text-gray-400 space-y-1 max-h-40 overflow-y-auto shadow-inner bg-black"></div>
        
        <div class="text-center text-[10px] text-gray-600 pb-10">
            Powered by Gemini | Data processed locally in browser. 
        </div>
    </div>

    <script>
        // --- 核心邏輯與原本功能保持 100% 一致，僅修改樣式與圖表配色 ---
        const TARGET_RANGE = { s: { c: 0, r: 20 }, e: { c: 3, r: 71 } }; 
        const TARGET_SHEET_NAME = "基金投資組合";
        const OUTPUT_FILENAME = "monitor.xlsx";
        let globalProcessedWorkbook = null; 
        let chartInstance = null;
        let tableData = [];
        let sortState = { key: 'rank', dir: 'asc' };

        window.onload = function() {
            const savedUrl = localStorage.getItem('etf_script_url');
            if (savedUrl) document.getElementById('scriptUrl').value = savedUrl;
        }

        function log(message, type = 'info') {
            const statusArea = document.getElementById('statusArea');
            statusArea.classList.remove('hidden');
            const div = document.createElement('div');
            div.innerHTML = `<span class="text-yellow-800">#</span> ${message}`;
            if (type === 'error') div.className = 'text-red-500';
            if (type === 'success') div.className = 'text-green-500';
            statusArea.appendChild(div);
            statusArea.scrollTop = statusArea.scrollHeight;
        }

        function switchTab(tab) {
            const mergerSec = document.getElementById('section-merger');
            const viewerSec = document.getElementById('section-viewer');
            const mergerBtn = document.getElementById('tab-merger');
            const viewerBtn = document.getElementById('tab-viewer');
            
            if (tab === 'merger') {
                mergerSec.classList.remove('hidden');
                viewerSec.classList.add('hidden');
                mergerBtn.className = "tab-btn flex-1 py-3 rounded-lg text-sm tab-active";
                viewerBtn.className = "tab-btn flex-1 py-3 rounded-lg text-sm tab-inactive";
            } else {
                mergerSec.classList.add('hidden');
                viewerSec.classList.remove('hidden');
                viewerBtn.className = "tab-btn flex-1 py-3 rounded-lg text-sm tab-active";
                mergerBtn.className = "tab-btn flex-1 py-3 rounded-lg text-sm tab-inactive";
            }
        }

        async function readExcelFile(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = (e) => {
                    try { resolve(XLSX.read(new Uint8Array(e.target.result), { type: 'array' })); } 
                    catch (err) { reject(err); }
                };
                reader.onerror = reject;
                reader.readAsArrayBuffer(file);
            });
        }

        function extractDateFromFilename(filename) {
            const match = filename.match(/(\d{8})/);
            return match ? match[1] : new Date().toISOString().split('T')[0].replace(/-/g, '');
        }

        async function processFiles() {
            const sourceInput = document.getElementById('sourceFile');
            const monitorInput = document.getElementById('monitorFile');
            const btn = document.getElementById('processBtn');
            const uploadSection = document.getElementById('uploadSection');

            document.getElementById('statusArea').innerHTML = '';
            if (!sourceInput.files.length) { alert('請選擇報表檔案！'); return; }

            try {
                btn.disabled = true; btn.textContent = '處理中...';
                log('啟動引擎，讀取資料檔...');

                let monitorWorkbook = monitorInput.files.length > 0 ? await readExcelFile(monitorInput.files[0]) : XLSX.utils.book_new();
                let outputName = monitorInput.files.length > 0 ? monitorInput.files[0].name : OUTPUT_FILENAME;

                const files = Array.from(sourceInput.files).sort((a, b) => a.name.localeCompare(b.name));
                let successCount = 0;

                for (let file of files) {
                    try {
                        const sheetNameDate = extractDateFromFilename(file.name);
                        const sourceWorkbook = await readExcelFile(file);
                        let targetSheet = sourceWorkbook.Sheets[TARGET_SHEET_NAME] || sourceWorkbook.Sheets[sourceWorkbook.SheetNames[0]];
                        const extractedData = XLSX.utils.sheet_to_json(targetSheet, { header: 1, range: TARGET_RANGE });
                        
                        if (extractedData.length > 0) {
                            if (monitorWorkbook.SheetNames.includes(sheetNameDate)) {
                                monitorWorkbook.SheetNames.splice(monitorWorkbook.SheetNames.indexOf(sheetNameDate), 1);
                                delete monitorWorkbook.Sheets[sheetNameDate];
                            }
                            XLSX.utils.book_append_sheet(monitorWorkbook, XLSX.utils.aoa_to_sheet(extractedData), sheetNameDate);
                            successCount++;
                            log(`解析完畢: ${sheetNameDate}`);
                        }
                    } catch (e) { log(`錯誤跳過 ${file.name}: ${e.message}`, 'error'); }
                }

                if (successCount > 0) {
                    XLSX.writeFile(monitorWorkbook, outputName);
                    globalProcessedWorkbook = monitorWorkbook;
                    uploadSection.classList.remove('hidden');
                    log(`任務完成，已下載：${outputName}`, 'success');
                }
            } catch (error) { log(`嚴重錯誤: ${error.message}`, 'error'); } 
            finally { btn.disabled = false; btn.innerHTML = '<i class="fa-solid fa-gears"></i> 執行匯整並下載 Excel'; }
        }

        async function uploadToGoogleSheets() {
            const url = document.getElementById('scriptUrl').value.trim();
            const btn = document.getElementById('uploadBtn');
            if (!url || !globalProcessedWorkbook) { alert('請檢查網址或先執行匯整'); return; }

            try {
                btn.disabled = true; btn.textContent = '傳輸中...';
                const sheetsData = globalProcessedWorkbook.SheetNames.map(name => ({
                    name: name, data: XLSX.utils.sheet_to_json(globalProcessedWorkbook.Sheets[name], { header: 1 })
                }));

                for (let i = 0; i < sheetsData.length; i++) {
                    log(`傳送資料封包 [${i+1}/${sheetsData.length}]: ${sheetsData[i].name}`);
                    await fetch(url, { method: 'POST', mode: 'no-cors', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(sheetsData[i]) });
                    await new Promise(r => setTimeout(r, 800));
                }
                log('雲端同步指令已全數發出', 'success');
                alert('上傳完畢！請前往 Google Sheets 查看結果');
            } catch (error) { log(`傳輸失敗: ${error.message}`, 'error'); } 
            finally { btn.disabled = false; btn.textContent = '開始雲端同步'; }
        }

        async function loadChartData() {
            const fileInput = document.getElementById('viewerFile');
            if (!fileInput.files.length) return;
            document.getElementById('statusArea').innerHTML = '';
            
            try {
                const workbook = await readExcelFile(fileInput.files[0]);
                let sheets = workbook.SheetNames.sort();
                const latestSheet = workbook.Sheets[sheets[sheets.length - 1]];
                const latestDataRaw = XLSX.utils.sheet_to_json(latestSheet, { header: 1 });
                
                let startIdx = (latestDataRaw.length > 0 && typeof latestDataRaw[0][1] === 'string' && latestDataRaw[0][1].includes('名稱')) ? 1 : 0;
                let targetStocks = [];
                for (let i = startIdx; i < startIdx + 50; i++) {
                    if (latestDataRaw[i] && latestDataRaw[i][1]) targetStocks.push(latestDataRaw[i][1]);
                }

                const datasets = {};
                targetStocks.forEach(s => datasets[s] = []);

                sheets.forEach(sheetName => {
                    const rows = XLSX.utils.sheet_to_json(workbook.Sheets[sheetName], { header: 1 });
                    const map = {};
                    rows.forEach(row => {
                        if (row.length > 3) {
                            let v = row[3];
                            if (typeof v === 'string') v = parseFloat(v.replace(/[%|,]/g, ''));
                            if (row[1] && !isNaN(v)) map[row[1]] = v;
                        }
                    });
                    targetStocks.forEach(s => datasets[s].push(map[s] !== undefined ? map[s] : null));
                });

                drawChart(sheets, targetStocks, datasets);
                
                tableData = targetStocks.map((s, i) => {
                    const vals = datasets[s];
                    const trend = analyzeTrend(vals);
                    return { rank: i + 1, name: s, weight: vals[vals.length - 1], history: vals, trendText: trend.text, trendClass: trend.class, trendVal: trend.val };
                });
                handleSort('rank'); 
            } catch (err) { log(`解析錯誤: ${err.message}`, 'error'); }
        }

        function analyzeTrend(values) {
            const len = values.length;
            if (len < 2) return { text: '-', class: 'text-gray-600', val: 0 };
            const cur = values[len - 1], prev = values[len - 2], prev2 = len >= 3 ? values[len - 3] : null;
            const isCurValid = cur !== null && cur > 0, isPrevValid = prev !== null && prev > 0;

            if (isCurValid && !isPrevValid) return { text: 'NEW 新入榜', class: 'badge-new', val: 2 };
            if (len >= 3 && isCurValid && isPrevValid && prev2 !== null && prev2 > 0) {
                if (cur > prev && prev > prev2) return { text: '連漲 3 天', class: 'badge-up', val: 1 };
                if (cur < prev && prev < prev2) return { text: '連跌 3 天', class: 'badge-down', val: -1 };
            }
            return { text: '-', class: 'text-gray-600', val: 0 };
        }

        function handleSort(key) {
            if (sortState.key === key) sortState.dir = sortState.dir === 'asc' ? 'desc' : 'asc';
            else { sortState.key = key; sortState.dir = (key === 'weight' || key === 'trendVal') ? 'desc' : 'asc'; }

            document.querySelectorAll('.sort-icon').forEach(el => el.classList.remove('sort-asc', 'sort-desc'));
            const activeHeader = document.querySelector(`#header-${key === 'trendVal' ? 'trend' : key}`);
            if (activeHeader) activeHeader.classList.add(sortState.dir === 'asc' ? 'sort-asc' : 'sort-desc');

            tableData.sort((a, b) => {
                let valA = a[key] ?? -Infinity, valB = b[key] ?? -Infinity;
                return sortState.dir === 'asc' ? (valA > valB ? 1 : -1) : (valA < valB ? 1 : -1);
            });
            renderTable();
        }

        function renderTable() {
            const container = document.getElementById('dataTableBody');
            container.innerHTML = '';
            tableData.forEach((rowObj) => {
                const row = document.createElement('div');
                row.className = "grid grid-cols-12 gap-2 p-3 text-xs hover:bg-[#2b3139] items-center border-b border-gray-900 transition-colors";
                row.innerHTML = `
                    <div class="col-span-1 font-mono text-gray-500 pl-2">#${rowObj.rank.toString().padStart(2,'0')}</div>
                    <div class="col-span-3 font-bold text-gray-200 truncate">${rowObj.name}</div>
                    <div class="col-span-3 text-center">
                        <span class="text-[10px] px-2 py-0.5 rounded font-bold ${rowObj.trendClass}">${rowObj.trendText}</span>
                    </div>
                    <div class="col-span-5 flex justify-end gap-3 items-center">
                        <span class="font-bold text-yellow-500 w-16 text-right">${rowObj.weight!=null?rowObj.weight.toFixed(2)+'%':'-'}</span>
                        <div class="hidden md:flex gap-1">
                            ${rowObj.history.slice(-5).map(v=>`<span class="w-8 text-center text-[9px] py-0.5 rounded ${v>0?'bg-gray-800 text-gray-400':'text-gray-700'}">${v!=null?v.toFixed(1):'-'}</span>`).join('')}
                        </div>
                    </div>
                `;
                container.appendChild(row);
            });
        }

        function drawChart(labels, stocks, dataMap) {
            const ctx = document.getElementById('trendChart').getContext('2d');
            if (chartInstance) chartInstance.destroy();
            
            // 暗色系專用亮色線條
            const colors = ['#f0b90b', '#ef4444', '#22c55e', '#3b82f6', '#a855f7', '#06b6d4', '#f97316', '#ec4899', '#84cc16', '#14b8a6', '#6366f1', '#facc15', '#fb7185', '#94a3b8'];
            
            chartInstance = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
					datasets: stocks.slice(0, 300).map((s, i) => ({ // 僅顯示前 300 名避免畫面太亂
						label: s, data: dataMap[s], borderColor: colors[i % colors.length], 
						backgroundColor: colors[i % colors.length], // 將此處改為顏色變數，實現實心效果
						borderWidth: 2, tension: 0.1, pointRadius: 2, spanGaps: true
					}))
                },
                options: { 
                    responsive: true, maintainAspectRatio: false,
                    scales: {
                        x: { grid: { color: '#2b2f3a' }, ticks: { color: '#848e9c', font: { size: 10 } } },
                        y: { grid: { color: '#2b2f3a' }, ticks: { color: '#848e9c' } }
                    },
                    plugins: { 
                        legend: { position: 'right', labels: { color: '#eaecef', boxWidth: 10, font: { size: 11 } } },
                        tooltip: { backgroundColor: '#161a1e', titleColor: '#f0b90b', bodyColor: '#fff', borderColor: '#2b2f3a', borderWidth: 1 }
                    }
                }
            });
        }

        /* 新增功能：一鍵切換所有數據集顯示/隱藏 */
        function toggleChartAll(isVisible) {
            if (!chartInstance) return;
            chartInstance.data.datasets.forEach((ds, i) => {
                chartInstance.setDatasetVisibility(i, isVisible);
            });
            chartInstance.update();
        }
    </script>
</body>
</html>
